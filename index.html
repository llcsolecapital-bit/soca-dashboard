<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOCA AI Trading Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #0a0a0f; --card: #12121a; --card2: #1a1a24; --border: #2a2a3a; --text: #fff; --muted: #888; --green: #00ff88; --red: #ff4466; --blue: #4488ff; --yellow: #ffaa00; --purple: #aa66ff; --cyan: #00ddff; }
    body { font-family: 'SF Mono', 'Consolas', monospace; background: var(--bg); color: var(--text); }
    .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: var(--card); border-bottom: 1px solid var(--border); }
    .logo { font-size: 18px; font-weight: 700; letter-spacing: 2px; display: flex; align-items: center; gap: 8px; }
    .logo span { background: linear-gradient(135deg, var(--cyan), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .status { display: flex; gap: 16px; font-size: 11px; color: var(--muted); }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; animation: pulse 2s infinite; }
    .dot.green { background: var(--green); } .dot.red { background: var(--red); } .dot.yellow { background: var(--yellow); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .main { display: grid; grid-template-columns: 1fr 380px; gap: 12px; padding: 12px; height: calc(100vh - 50px); }
    .stats { grid-column: 1/-1; display: grid; grid-template-columns: repeat(7,1fr); gap: 10px; }
    .stat { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
    .stat-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .stat-value { font-size: 20px; font-weight: 700; margin-top: 2px; }
    .stat-value.green { color: var(--green); } .stat-value.red { color: var(--red); } .stat-value.cyan { color: var(--cyan); }
    .stat-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .panel { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
    .panel-header { padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); display: flex; justify-content: space-between; background: var(--card2); }
    .panel-body { flex: 1; overflow-y: auto; }
    .left { display: flex; flex-direction: column; gap: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 11px; }
    th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); }
    th { font-size: 9px; color: var(--muted); text-transform: uppercase; background: var(--card2); position: sticky; top: 0; }
    .sym { color: var(--blue); font-weight: 600; }
    .pos { color: var(--green); } .neg { color: var(--red); }
    .trade { display: flex; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 11px; }
    .badge { padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 600; margin-right: 6px; }
    .badge.buy { background: rgba(0,255,136,.15); color: var(--green); }
    .badge.sell { background: rgba(255,68,102,.15); color: var(--red); }
    .thought { padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 11px; }
    .thought-time { color: var(--muted); font-size: 9px; }
    .thought-text { margin-top: 2px; color: var(--cyan); }
    .news { padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 11px; }
    .news-sentiment { font-size: 9px; padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
    .news-sentiment.bullish { background: rgba(0,255,136,.15); color: var(--green); }
    .news-sentiment.bearish { background: rgba(255,68,102,.15); color: var(--red); }
    .news-sentiment.neutral { background: rgba(136,136,170,.15); color: var(--muted); }
    .ai-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 12px; font-size: 10px; }
    .ai-stat { background: var(--bg); padding: 8px; border-radius: 6px; }
    .ai-stat-label { color: var(--muted); font-size: 9px; }
    .ai-stat-value { color: var(--cyan); font-size: 14px; font-weight: 600; margin-top: 2px; }
    .watch { display: flex; justify-content: space-between; padding: 6px 12px; border-bottom: 1px solid var(--border); font-size: 11px; }
    .change { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
    .change.up { background: rgba(0,255,136,.12); color: var(--green); }
    .change.down { background: rgba(255,68,102,.12); color: var(--red); }
    .tabs { display: flex; border-bottom: 1px solid var(--border); }
    .tab { padding: 10px 14px; font-size: 10px; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }
    .controls { display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--border); }
    .btn { flex: 1; padding: 12px; border: none; border-radius: 6px; font-family: inherit; font-size: 11px; font-weight: 600; cursor: pointer; text-transform: uppercase; }
    .btn-start { background: var(--green); color: #000; }
    .btn-stop { background: var(--red); color: #fff; }
    .btn-close { background: var(--border); color: var(--text); }
    .empty { text-align: center; padding: 24px; color: var(--muted); font-size: 11px; }
    .settings { padding: 12px; }
    .setting-row { display: flex; gap: 10px; margin-bottom: 10px; }
    .setting-input { flex: 1; }
    .setting-input label { display: block; font-size: 9px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
    .setting-input input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 8px; color: var(--text); font-family: inherit; font-size: 12px; }
    .btn-save { background: var(--blue); color: #fff; width: 100%; margin-top: 8px; }
    .right { display: flex; flex-direction: column; gap: 12px; overflow: hidden; }
    @media(max-width:1100px) { .main { grid-template-columns: 1fr; } }
    @media(max-width:700px) { .stats { grid-template-columns: repeat(4,1fr); } }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">🧠 <span>SOCA AI</span></div>
    <div class="status">
      <span><span class="dot" id="schwabDot"></span><span id="schwabTxt">--</span></span>
      <span><span class="dot" id="streamDot"></span><span id="streamTxt">--</span></span>
      <span><span class="dot" id="mktDot"></span><span id="mktTxt">--</span></span>
      <span id="lastUpd">--</span>
    </div>
  </header>
 
  <main class="main">
    <div class="stats">
      <div class="stat"><div class="stat-label">Today P&L</div><div class="stat-value" id="dayPnl">$0</div><div class="stat-sub" id="dayTrades">0 trades</div></div>
      <div class="stat"><div class="stat-label">Total P&L</div><div class="stat-value" id="totPnl">$0</div><div class="stat-sub" id="totTrades">0 trades</div></div>
      <div class="stat"><div class="stat-label">Win Rate</div><div class="stat-value" id="winRate">0%</div><div class="stat-sub" id="winLoss">0W / 0L</div></div>
      <div class="stat"><div class="stat-label">Positions</div><div class="stat-value" id="openPos">0</div><div class="stat-sub" id="unrealized">$0</div></div>
      <div class="stat"><div class="stat-label">AI Risk</div><div class="stat-value cyan" id="riskAppetite">1.0x</div><div class="stat-sub" id="threshold">Thresh: 35</div></div>
      <div class="stat"><div class="stat-label">Bot</div><div class="stat-value" id="botStat">OFF</div><div class="stat-sub" id="dataSource">--</div></div>
      <div class="stat"><div class="stat-label">Mode</div><div class="stat-value" style="color:var(--yellow)">PAPER</div><div class="stat-sub">Simulated</div></div>
    </div>
 
    <div class="left">
      <div class="panel" style="flex:0.8">
        <div class="panel-header"><span>Open Positions</span><span id="posCount">0</span></div>
        <div class="panel-body" id="posBody"><div class="empty">No positions</div></div>
      </div>
      <div class="panel" style="flex:1">
        <div class="panel-header"><span>Trade History</span><span id="tradeCount">0</span></div>
        <div class="panel-body" id="logBody"><div class="empty">No trades yet</div></div>
      </div>
      <div class="controls">
        <button class="btn btn-start" id="startBtn" onclick="startBot()">▶ Start</button>
        <button class="btn btn-stop" id="stopBtn" onclick="stopBot()" style="display:none">⏹ Stop</button>
        <button class="btn btn-close" onclick="closeAll()">✕ Close All</button>
      </div>
    </div>
 
    <div class="right">
      <div class="panel" style="flex:1">
        <div class="tabs">
          <div class="tab active" onclick="showTab('thoughts')">🧠 AI Thoughts</div>
          <div class="tab" onclick="showTab('news')">📰 News</div>
          <div class="tab" onclick="showTab('signals')">⚡ Signals</div>
          <div class="tab" onclick="showTab('settings')">⚙️</div>
        </div>
        <div id="thoughtsTab" class="panel-body">
          <div class="ai-stats" id="aiStats"></div>
          <div id="thoughtsList"></div>
        </div>
        <div id="newsTab" class="panel-body" style="display:none"><div class="empty">No recent news</div></div>
        <div id="signalsTab" class="panel-body" style="display:none"><div class="empty">Waiting...</div></div>
        <div id="settingsTab" class="settings" style="display:none">
          <div class="setting-row">
            <div class="setting-input"><label>Take Profit %</label><input type="number" id="setTP" step="0.1" value="0.4"></div>
            <div class="setting-input"><label>Stop Loss %</label><input type="number" id="setSL" step="0.1" value="0.3"></div>
          </div>
          <div class="setting-row">
            <div class="setting-input"><label>Position Size %</label><input type="number" id="setPosSize" step="1" value="5"></div>
            <div class="setting-input"><label>Max Positions</label><input type="number" id="setMaxPos" step="1" value="8"></div>
          </div>
          <button class="btn btn-save" onclick="saveSettings()">💾 Save</button>
        </div>
      </div>
      <div class="panel" style="flex:0.6">
        <div class="panel-header"><span>Watchlist</span></div>
        <div class="panel-body" id="watchBody"><div class="empty">Loading...</div></div>
      </div>
    </div>
  </main>
 
  <script>
    const API = 'https://soca-proxy-production.up.railway.app';
    const f = (n,d=2) => (parseFloat(n)||0).toFixed(d);
    const pnl = n => { const v=parseFloat(n)||0; return (v>=0?'+':'')+`$${f(Math.abs(v))}`; };
    const tm = iso => iso ? new Date(iso).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'}) : '--';
 
    function showTab(t) {
      document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
      document.querySelector(`.tab[onclick="showTab('${t}')"]`).classList.add('active');
      ['thoughts','news','signals','settings'].forEach(id => {
        document.getElementById(id+'Tab').style.display = id===t ? 'block' : 'none';
      });
    }
 
    async function saveSettings() {
      const s = {
        scalp_tp_pct: parseFloat(document.getElementById('setTP').value),
        scalp_sl_pct: parseFloat(document.getElementById('setSL').value),
        scalp_pos_pct: parseFloat(document.getElementById('setPosSize').value),
        scalp_max_positions: parseInt(document.getElementById('setMaxPos').value)
      };
      try {
        const r = await fetch(`${API}/bot/settings`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(s) });
        if ((await r.json()).ok) alert('Settings saved!');
      } catch(e) { alert('Failed'); }
    }
 
    async function load() {
      try {
        const [st,qt] = await Promise.all([
          fetch(`${API}/bot/status`).then(r=>r.json()),
          fetch(`${API}/quote/AAPL,MSFT,NVDA,GOOGL,AMZN,META,SPY,QQQ,IWM,TSLA,COIN,PLTR,AMD,MARA,RIOT,SOFI,HOOD,RIVN,LCID`).then(r=>r.json())
        ]);
 
        // Status
        document.getElementById('schwabDot').className = `dot ${st.schwabConnected?'green':'red'}`;
        document.getElementById('schwabTxt').textContent = st.schwabConnected ? 'Schwab ✓' : 'Disconnected';
        document.getElementById('streamDot').className = `dot ${st.streamerConnected?'green':'yellow'}`;
        document.getElementById('streamTxt').textContent = st.streamerConnected ? 'Stream' : 'Poll';
        document.getElementById('mktDot').className = `dot ${st.marketStatus==='OPEN'?'green':'yellow'}`;
        document.getElementById('mktTxt').textContent = st.marketStatus || '--';
        document.getElementById('lastUpd').textContent = tm(qt.lastUpdate);
 
        // Stats
        const s = st.stats || {};
        const dp = document.getElementById('dayPnl'); dp.textContent = pnl(s.todayPnL); dp.className = `stat-value ${s.todayPnL>=0?'green':'red'}`;
        document.getElementById('dayTrades').textContent = `${s.todayTrades||0} trades`;
        const tp = document.getElementById('totPnl'); tp.textContent = pnl(s.totalPnL); tp.className = `stat-value ${s.totalPnL>=0?'green':'red'}`;
        document.getElementById('totTrades').textContent = `${s.totalTrades||0} trades`;
        document.getElementById('winRate').textContent = s.totalTrades>0 ? f(s.wins/s.totalTrades*100,1)+'%' : '0%';
        document.getElementById('winLoss').textContent = `${s.wins||0}W / ${s.losses||0}L`;
        document.getElementById('openPos').textContent = st.positions?.length || 0;
        document.getElementById('posCount').textContent = st.positions?.length || 0;
        
        const unr = (st.positions||[]).reduce((sum,p)=>sum+(p.pnl||0),0);
        document.getElementById('unrealized').textContent = pnl(unr);
 
        // AI Stats
        const ai = st.ai || {};
        const mem = ai.memory || {};
        document.getElementById('riskAppetite').textContent = (mem.riskAppetite || 1).toFixed(2) + 'x';
        document.getElementById('threshold').textContent = `Thresh: ${mem.entryThreshold || 35}`;
 
        const bs = document.getElementById('botStat'); bs.textContent = st.botRunning?'ON':'OFF'; bs.className = `stat-value ${st.botRunning?'green':''}`;
        document.getElementById('dataSource').textContent = st.dataSource || '--';
        document.getElementById('startBtn').style.display = st.botRunning ? 'none' : 'block';
        document.getElementById('stopBtn').style.display = st.botRunning ? 'block' : 'none';
 
        // Settings
        const set = st.settings || {};
        document.getElementById('setTP').value = set.scalp_tp_pct || 0.4;
        document.getElementById('setSL').value = set.scalp_sl_pct || 0.3;
        document.getElementById('setPosSize').value = set.scalp_pos_pct || 5;
        document.getElementById('setMaxPos').value = set.scalp_max_positions || 8;
 
        // AI Stats Panel
        const weights = mem.weights || {};
        document.getElementById('aiStats').innerHTML = `
          <div class="ai-stat"><div class="ai-stat-label">Decisions</div><div class="ai-stat-value">${mem.decisionsAnalyzed || 0}</div></div>
          <div class="ai-stat"><div class="ai-stat-label">Trades</div><div class="ai-stat-value">${mem.tradesExecuted || 0}</div></div>
          <div class="ai-stat"><div class="ai-stat-label">Risk</div><div class="ai-stat-value">${(mem.riskAppetite || 1).toFixed(2)}x</div></div>
          <div class="ai-stat"><div class="ai-stat-label">Threshold</div><div class="ai-stat-value">${mem.entryThreshold || 35}</div></div>
        `;
 
        // AI Thoughts
        const thoughts = ai.thoughts || [];
        document.getElementById('thoughtsList').innerHTML = thoughts.length ?
          thoughts.slice(0,30).map(t => `<div class="thought"><div class="thought-time">${tm(t.time)} | Risk: ${t.riskAppetite}x | Thresh: ${t.threshold}</div><div class="thought-text">${t.thought}</div></div>`).join('')
          : '<div class="empty">No thoughts yet - start the bot!</div>';
 
        // News
        const news = ai.recentNews || [];
        document.getElementById('newsTab').innerHTML = news.length ?
          news.slice(0,20).map(n => `<div class="news"><div>${n.headline?.slice(0,80)}...<span class="news-sentiment ${n.sentiment?.toLowerCase()}">${n.sentiment} ${n.score>0?'+':''}${n.score}</span></div><div style="font-size:9px;color:var(--muted);margin-top:4px">${n.source} · ${tm(n.time)}</div></div>`).join('')
          : '<div class="empty">No recent news</div>';
 
        // Positions
        const pos = st.positions || [];
        document.getElementById('posBody').innerHTML = pos.length ? 
          `<table><tr><th>Sym</th><th>Qty</th><th>Entry</th><th>Now</th><th>P&L</th><th>Why</th></tr>${pos.map(p=>`<tr><td class="sym">${p.sym}</td><td>${p.qty}</td><td>$${f(p.avgPrice)}</td><td>$${f(p.currentPrice)}</td><td class="${p.pnl>=0?'pos':'neg'}">${pnl(p.pnl)}</td><td style="font-size:9px;color:var(--muted)">${p.reasons||''}</td></tr>`).join('')}</table>` 
          : '<div class="empty">No positions</div>';
 
        // Trade log
        const log = st.tradeLog || [];
        document.getElementById('tradeCount').textContent = log.length;
        document.getElementById('logBody').innerHTML = log.length ?
          log.slice(0,50).map(t => `<div class="trade"><div><span class="badge ${t.side.toLowerCase()}">${t.side}</span><span class="sym">${t.sym}</span> ${t.qty}@$${f(t.price)}</div><div style="text-align:right">${t.pnl?`<span class="${parseFloat(t.pnl)>=0?'pos':'neg'}">${pnl(t.pnl)}</span><br>`:''}${tm(t.time)}</div></div>`).join('')
          : '<div class="empty">No trades yet</div>';
 
        // Signals
        const sig = st.signalLog || [];
        document.getElementById('signalsTab').innerHTML = sig.length ?
          sig.slice(0,30).map(s => `<div class="thought"><div class="thought-time">${tm(s.time)} | ${s.direction}</div><div class="thought-text">${s.sym} @ $${f(s.price)} | Score: ${s.confidence} | ${s.reasons}</div></div>`).join('')
          : '<div class="empty">Waiting for signals...</div>';
 
        // Watchlist
        const tickers = qt.tickers || [];
        document.getElementById('watchBody').innerHTML = tickers.length ?
          tickers.map(q => `<div class="watch"><span class="sym">${q.ticker}</span><span>$${f(q.lastPrice)}<span class="change ${(q.netChangePct||0)>=0?'up':'down'}">${(q.netChangePct||0)>=0?'+':''}${f(q.netChangePct||0)}%</span></span></div>`).join('')
          : '<div class="empty">No data</div>';
 
      } catch(e) { console.error(e); }
    }
 
    async function startBot() { try { await fetch(`${API}/bot/start`,{method:'POST'}); load(); } catch(e){} }
    async function stopBot() { try { await fetch(`${API}/bot/stop`,{method:'POST'}); load(); } catch(e){} }
    async function closeAll() { if(!confirm('Close all?'))return; try { await fetch(`${API}/bot/closeall`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reason:'MANUAL'})}); load(); } catch(e){} }
 
    load(); setInterval(load, 1000);
  </script>
</body>
</html>
